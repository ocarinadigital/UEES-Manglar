<!DOCTYPE html>
<!--
  DISPLAY — Mangle Rojo (Rhizophora samoensis), UEES · Ocarina Digital
  Repo: UEES-Manglar · displays/mangle-rojo/index.html
  Generado a partir de display-base.html (Sistema Tipo 2 — Displays AR),
  siguiendo Display: Instrucciones (Notion) + Leyes de Layout (Notion) +
  Brief Técnico: Mangle Rojo (Notion). La estructura, el sistema de capas del
  visor, el sistema de popups y las reglas de rendimiento son verbatim del
  base — no se tocan pieza por pieza. Lo único piso por este BT: paleta,
  MODEL_URL, MATERIAL_CONFIG, HOTSPOTS_3D y los textos de título/badge/CTA.

  Estado: BORRADOR — assets pendientes de recibir del cliente (logo.png,
  mangle_model.glb, hotspot-*.jpg). Placeholders grises activos para todo lo
  no subido aún, por diseño del sistema.

  Nota sobre HOTSPOTS_3D: los azimuthDeg/heightFraction de este archivo se
  estimaron por análisis de vértices sobre el .glb real adjuntado con el BT
  (no a ojo): base robusta (percentil 1) ≈ y 0.10, tope ≈ y 2.99 en espacio
  local del modelo, banda de raíces (0–8% de altura desde la base) con mayor
  densidad de puntos entre azimut 120°–180°; follaje denso concentrado cerca
  de azimut 0°–30° en la mitad superior de la copa; un clúster geométrico
  aislado y de menor tamaño (posible flor/propágulo, distinto de las mallas
  de follaje masivo) centrado en azimut ≈300°, altura ≈50%. Perfil de
  Composición evaluado automáticamente: P = size.y / max(size.x,size.z) ≈
  2.99 / 2.70 ≈ 1.11 → "equilibrado" (dentro de 0.7–1.4), sin necesidad de
  override — confirma lo indicado en el BT (Automático/default).
-->
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<!-- LEY (Leyes_de_Layout, regla de Imagen de Fondo): color de las barras del
     navegador. Solo importa cuando el BT define un fondo con imagen (bg-display.png):
     debe coincidir con el color del BORDE SUPERIOR de esa imagen. Ni Safari iOS ni
     Chrome Android muestrean la imagen — el color hay que declararlo acá. Con fondo
     sólido (sin BG_DISPLAY) queda igual a --bg. -->
<meta name="theme-color" content="#F6F3EF">
<title>Mangle Rojo — Display AR — UEES</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ===== PALETA STD — Tipo 2 (Display AR) =====
     Estas 5 variables son el ÚNICO lugar donde un D define su identidad visual.
     Valores neutros por defecto: si el BT no especifica colores, el D se ve en
     blanco/negro/gris sin tinte de marca alguno. El BT de cada cliente pisa
     estas variables (no la estructura ni el resto del CSS) para aplicar su
     paleta real. --bg-transparent existe para folios/casos donde no se quiere
     fondo sólido (ej. si el D se inserta sobre un fondo ya definido afuera).
     Fondo sólido, NUNCA gradiente (ver LEY 3 de Leyes_De_Layout.pdf): Safari iOS
     pinta el área detrás de sus barras (safe areas) con el background-color de
     <body>, que es un único color plano — un gradiente de varios stops no puede
     coincidir con ambos extremos a la vez, y genera una costura de color visible
     en los bordes superior e inferior. Por eso el fondo de toda la pantalla usa
     un solo color sólido (--bg), igual al de <body>. */
  :root{
    --bg:#F6F3EF;        /* fondo principal de pantalla — color sólido único, igual al del <body> */
    --bg-transparent:transparent; /* alternativa si el BT pide fondo transparente */
    --ink:#1C1B1A;        /* texto principal */
    --gold:#7A1E39;       /* color de acento — bordó/guinda institucional UEES (ocupa el slot de acento, no es dorado) */
    --gold-soft:#D9C7C2;  /* acento suave — bordó suavizado (bordes/líneas) */
    --card:#F3EEE5;       /* fondo de tarjetas/popups */

    /* SISTEMA DE COLOR POR COMPONENTE (Display_Instrucciones.pdf → "Sistema de Color por
       Componente"): cada variable de acá controla el color de UN elemento puntual. Todas
       heredan por default de las 5 variables base de arriba, así que si el BT no las pisa,
       el D se ve exactamente igual que antes de que existieran — el BT solo declara la que
       quiera divergir de su default. Excepciones fijas (sin variable, ver más abajo en el
       CSS): el brillo barredor del CTA (.cta-shine, blanco fijo) y el fondo/texto del
       círculo numerado del hotspot (fondo navy + texto dorado fijos — solo su borde es
       variable, --hotspot-number-border). */
    --cta-bg:#70252D;                      /* fondo del botón "Explorar la especie" (BT) */
    --cta-text:#FFFFFF;                    /* texto del CTA (BT) */
    --badge-bg:#70252D;                    /* fondo de la pill del badge (BT) */
    --badge-text:#FFFFFF;                  /* texto del badge (BT) */
    --badge-popup-text:var(--ink);         /* (default, sin override en BT) */
    --hotspot-popup-bg:#F3EEE5;            /* fondo de los popups de hotspot (BT) */
    --hotspot-popup-title:var(--ink);      /* (default, sin override en BT) */
    --hotspot-popup-text:var(--ink);       /* (default, sin override en BT) */
    --title-text:#000000;                  /* texto del título h1 (BT) */
    --subtitle-text:#70252D;               /* texto del subtítulo (BT) */
    --back-link-text:#000000;              /* texto y flecha de "volver al escáner" (BT) */
    --rule-color:#70252D;                  /* línea divisoria bajo el título (BT) */
    --ring-color:#70252D;                  /* anillo de rotación y sus flechas (BT) */
    --rotate-hint-color:#70252D;           /* texto e ícono de "desliza para rotar" (BT) */
    --border-color:var(--gold-soft);       /* (default, sin override en BT) */
    --hotspot-number-border:#70252D;       /* borde del círculo numerado del hotspot (BT) */

    /* LEY 8 (Leyes_de_Layout.pdf) — Sistema de Movimiento único: todo
       movimiento del sistema usa exclusivamente estos tokens y esta curva.
       Prohibido introducir duraciones, curvas o animaciones nuevas por pieza
       sin pedido explícito del BT y su correspondiente documentación. */
    --motion-fast:150ms;   /* microinteracciones táctiles */
    --motion-base:240ms;   /* transiciones de contenido */
    --motion-slow:320ms;   /* transiciones de pantalla / shimmer */
    --motion-ease:cubic-bezier(0.4, 0, 0.2, 1); /* curva única de easing */

    /* TIPOGRAFÍA DEL D — fuente única de verdad por rol (ver tabla "Tipografía
       del D" en Display_Instrucciones.pdf). Valor único en vw por rol: el D NO
       tiene jerarquía de sacrificio (el visor flexible absorbe el espacio, el
       texto no se encoge), así que no usa clamp min/ideal/máx como el DT. Para
       ajustar un tamaño se edita acá — un solo lugar por rol. */
    --fs-h1:6.8vw;             /* título de la pieza */
    --fs-subtitle:2.6vw;       /* subtítulo / clasificación */
    --fs-badge:2.5vw;          /* texto del badge en pantalla */
    --fs-back-link:2.5vw;      /* "volver al escáner" */
    --fs-rotate-hint:2.6vw;    /* "Desliza para rotar" */
    --fs-cta-title:4.4vw;      /* texto del CTA */
    --fs-hotspot-number:3.2vw; /* número de hotspot */
    --fs-popup-title:4.6vw;    /* título del popup de hotspot */
    --fs-popup-text:3.4vw;     /* texto de los popups (badge y hotspot) */
    --fs-popup-badge:2.6vw;    /* pill del popup de badge */
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html, body{ height:100%; overflow:hidden; touch-action:manipulation; }
  *{ touch-action:manipulation; }
  /* LEY 3: color sólido explícito en <body>, igual a --bg — nunca gradiente. */
  body{ background:var(--bg); color:var(--ink); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; }
  /* LEY 1: el contenedor raíz se ancla al viewport real con position:fixed;
     inset:0; overflow:hidden — NUNCA height:100vh/100dvh (Safari iOS reserva
     espacio dinámico para sus barras, y solo fixed+inset:0 ancla bien en todos
     los estados de esas barras). inset:0 + margin:0 auto + max-width conservan
     el centrado horizontal en pantallas anchas. LEY 3: background sólido
     explícito también en el raíz, igual al del <body>. */
  .screen{ position:fixed; inset:0; max-width:480px; margin:0 auto; background:var(--bg); display:flex; flex-direction:column; overflow:hidden; }

  /* IMAGEN DE FONDO (opcional, activada por BT con <body class="has-bg-display">).
     El .bg-display es HERMANO de .screen y position:fixed; inset:0, por DEBAJO de
     .screen (z-index:0). Sangra por detrás del chrome de Safari (gracias a
     viewport-fit=cover) para que las barras se apoyen sobre la continuación de la
     propia imagen, sin costura de color sólido. En Android la barra de address es
     chrome opaco: su color lo da <meta name="theme-color"> = color del borde superior
     de la imagen (declarado por BT). Con fondo sólido (sin la clase) el div no se
     renderiza y el D se comporta igual que antes. NO es un gradiente CSS (LEY 3):
     es una imagen que sangra — mecanismo distinto, sin el problema de costura. */
  .bg-display{ display:none; }
  body.has-bg-display .bg-display{
    display:block; position:fixed; inset:0; z-index:0; pointer-events:none;
    background:url('assets/bg-display.png') center center / cover no-repeat;
  }
  body.has-bg-display .screen{ background:transparent; }

  header{ display:flex; align-items:center; justify-content:space-between; padding:1.5vh 6vw 0 6vw; flex-shrink:0; }
  .logo{ display:flex; align-items:center; }
  /* Logo del cliente — siempre PNG con transparencia (assets/logo.png). Altura fija,
     ancho automático: respeta la proporción real del archivo subido en vez de forzarlo
     a un círculo, ya que cada cliente puede traer un logo de proporciones distintas. */
  .logo-mark{ height:13.5vw; max-height:63px; width:auto; display:block; }
  /* LEY DE HEADER — back-link SIEMPRE en una sola línea: flecha + texto en fila,
     centrados verticalmente entre sí. Nunca apilados (flecha arriba, texto abajo
     con salto de línea), ese patrón quedó descartado tras revisión en dispositivo real. */
  .back-link{ display:flex; flex-direction:row; align-items:center; gap:1.2vw; color:var(--back-link-text); font-size:var(--fs-back-link); line-height:1.2; cursor:pointer; white-space:nowrap; }
  .back-link .arrow{ font-size:4.5vw; margin:0; line-height:1; }

  .title-block{ padding:0.8vh 7vw 0 7vw; text-align:center; flex-shrink:0; }
  .badge{
    display:inline-flex;
    align-items:center;
    border:1px solid var(--border-color);
    background:var(--badge-bg);
    color:var(--badge-text);
    font-size:var(--fs-badge);
    font-family:'Inter', sans-serif;
    font-weight:600;
    letter-spacing:0.14em;
    text-transform:uppercase;
    padding:0.5vh 3.5vw;
    border-radius:100px;
    margin-bottom:0.8vh;
    cursor:pointer;
  }

  .info-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(28,27,25,0.45);
    z-index:50;
    align-items:center;
    justify-content:center;
    padding:8vw;
  }
  .info-overlay.open{ display:flex; }
  .info-box{
    position:relative;
    background:var(--bg);
    border:1px solid var(--border-color);
    border-radius:18px;
    /* Padding parejo: vertical igualado al de los costados (antes 3.5vh/2.5vh, más
       grande que los 5vw laterales en un celular alto). Caja más compacta. */
    padding:5vw;
    max-width:380px;
    width:100%;
    box-shadow:0 12px 36px rgba(0,0,0,0.25);
  }
  .info-box-badge{
    display:inline-block;
    border:1px solid var(--border-color);
    color:var(--badge-text);
    font-size:var(--fs-popup-badge);
    font-weight:600;
    letter-spacing:0.14em;
    text-transform:uppercase;
    padding:0.6vh 4vw;
    border-radius:100px;
    margin-bottom:2vh;
  }
  .hotspot-popup-title{
    font-family:'Cormorant Garamond',serif;
    font-size:var(--fs-popup-title);
    font-weight:600;
    color:var(--hotspot-popup-title);
    margin-bottom:1.5vh;
  }
  .hotspot-popup-image{
    width:100%;
    height:32vh;
    object-fit:cover;
    border-radius:10px;
    margin-bottom:1.5vh;
    display:block;
  }
  .hotspot-popup-image-placeholder{
    width:100%;
    height:32vh;
    background:#E4E1DA;
    border-radius:10px;
    align-items:center;
    justify-content:center;
    color:#9B968C;
    font-size:2.8vw;
    margin-bottom:1.5vh;
  }
  .info-box p{
    font-size:var(--fs-popup-text);
    line-height:1.55;
    color:var(--ink);
  }
  /* Fondo y texto de popup, por contenedor: el popup de badge (#infoOverlay) y los popups
     de hotspot (#hotspotPopupsContainer) comparten el mismo componente .info-box, pero cada
     uno tiene sus propias variables de color (Sistema de Color por Componente). Estas reglas
     tienen mayor especificidad que .info-box / .info-box p de arriba y las pisan. */
  #infoOverlay .info-box p{ color:var(--badge-popup-text); }
  #hotspotPopupsContainer .info-box{ background:var(--hotspot-popup-bg); }
  #hotspotPopupsContainer .info-box p{ color:var(--hotspot-popup-text); }
  .info-close{
    position:absolute;
    /* alineada con la nueva esquina del contenido (padding parejo de 5vw) */
    top:5vw;
    right:5vw;
    width:7vw;
    height:7vw;
    max-width:30px;
    max-height:30px;
    border-radius:50%;
    border:1px solid var(--border-color);
    background:transparent;
    color:var(--gold);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0;
  }
  /* Ícono de cierre = X de SVG de línea fina (sprite STD #ic-close), no el glifo
     &times; (que queda descentrado por sus métricas de fuente). Centrado geométrico
     perfecto y sin emojis. Toma el color del botón vía currentColor. */
  .info-close .ic{ width:42%; height:42%; display:block; }
  h1{ font-family:'Cormorant Garamond',serif; font-weight:600; font-size:var(--fs-h1); line-height:1.05; margin-bottom:0.6vh; color:var(--title-text); }
  /* Divisor del título: ancho = 110% del ancho REAL del texto del h1 (lo mide
     el JS con un Range y setea --rule-width; fallback 36px). Márgenes verticales
     ampliados para separarlo del título y del subtítulo (LEY 6: unidad relativa). */
  .rule{ width:var(--rule-width, 36px); max-width:100%; height:1px; background:var(--rule-color); margin:1.3vh auto 1.3vh auto; }
  .subtitle{ font-size:var(--fs-subtitle); letter-spacing:0.12em; text-transform:uppercase; color:var(--subtitle-text); font-weight:600; margin-bottom:0.8vh; }
  .description{ font-size:2.8vw; line-height:1.4; color:rgba(28,27,25,0.75); max-width:90%; margin:0 auto; }

  /* LEY 2: los hijos estructurales ocupan pantalla con porcentajes (heredan
     del raíz fixed), nunca con vh/dvh. El visor es el 50% de la pantalla (STD). */
  .viewer-wrap{ position:relative; margin:1vh 0 0 0; flex:1 1 auto; min-height:45%; overflow:hidden; }
  #viewer3d{ width:100%; height:85%; position:absolute; top:0; left:0; z-index:2; }
  #viewer3d canvas{ touch-action:none; cursor:grab; display:block; }

  .loading-msg{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:3vw; color:#999; text-align:center; padding:0 10vw; }
  .error-msg{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:3vw; color:#b33; text-align:center; padding:0 10vw; }

  /* Estado de carga del visor: placeholder elíptico en la zona del suelo con
     shimmer mientras el GLB descarga — convive con el % de progreso de
     .loading-msg. Se elimina al terminar la carga (éxito o error). Su posición
     es solo un placeholder previo al modelo: el anclaje real del suelo
     (sombra+anillo) lo calcula el JS por proyección (regla E3). */
  .viewer-shimmer{
    position:absolute;
    left:50%;
    bottom:8%;
    transform:translateX(-50%);
    width:60%;
    height:14%;
    border-radius:50%;
    background:#E4E1DA;
    z-index:1;
    pointer-events:none;
  }
  /* Shimmer genérico (visor + imágenes de popups): franja de gradiente que
     barre el placeholder en loop a duración slow con la curva única (LEY 8).
     Bajo prefers-reduced-motion queda el placeholder gris estático (ver bloque
     reduced-motion al final del CSS). */
  .shimmer{ position:relative; overflow:hidden; }
  .shimmer::after{
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(100deg, transparent 25%, rgba(255,255,255,0.6) 50%, transparent 75%);
    transform:translateX(-100%);
    animation:shimmerSweep var(--motion-slow) var(--motion-ease) infinite;
  }
  @keyframes shimmerSweep{
    to{ transform:translateX(100%); }
  }

  .hotspot-anchor{ position:absolute; width:1.6vw; height:1.6vw; max-width:8px; max-height:8px; border-radius:50%; background:var(--gold-soft); pointer-events:none; transform:translate(-50%,-50%); }
  .hotspot-number{ position:absolute; width:6.5vw; height:6.5vw; max-width:28px; max-height:28px; border-radius:50%; background:#1C2333; border:1.4px solid var(--hotspot-number-border); color:#E8C77A; display:flex; align-items:center; justify-content:center; font-size:var(--fs-hotspot-number); font-weight:700; cursor:pointer; transform:translate(-50%,-50%); box-shadow:0 2px 6px rgba(0,0,0,0.25); }
  .hotspot-number::after{
    content:'';
    position:absolute;
    inset:0;
    border-radius:50%;
    border:1.4px solid var(--border-color);
    animation: hotspotBreathe 2.4s var(--motion-ease) infinite; /* curva única (LEY 8) */
  }
  @keyframes hotspotBreathe{
    0%, 100% { transform: scale(1); opacity: 0.7; }
    50% { transform: scale(1.55); opacity: 0; }
  }
  #hotspots3d{ position:absolute; inset:0; pointer-events:none; z-index:5; }
  #hotspots3d .hotspot-number{ pointer-events:auto; }

  /* E3 (Ley de Encuadre): sombra y anillo NO se anclan con porcentajes CSS —
     su ancho (derivado del footprint proyectado de la base, clamp 55%–96% del
     visor) y su posición vertical (proyección del punto del mundo (0,0,0) a
     pantalla) los fija el JS al terminar de cargar el modelo y en cada resize
     (debounced). Hasta entonces permanecen ocultos. */
  .shadow-plane{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    visibility:hidden;
    height:auto;
    z-index:1;
    pointer-events:none;
  }
  .rotate-arc-ring{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    visibility:hidden;
    height:auto;
    color:var(--ring-color);
    z-index:3;
    pointer-events:none;
  }
  .rotate-hint-text{
    position:absolute;
    bottom:6%;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    align-items:center;
    gap:1.8vw;
    color:var(--rotate-hint-color);
    font-size:var(--fs-rotate-hint);
    white-space:nowrap;
    z-index:4;
  }
  .hand-icon-wrap{
    width:7vw;
    max-width:30px;
    height:7vw;
    max-height:30px;
    flex-shrink:0;

  /* Sin ícono: solo título (definido por BT) + flecha, centrados como grupo
     para máximo protagonismo del texto. */
  .cta-detail{
    margin:0 6vw 1.6vh 6vw; background:var(--cta-bg); border:1px solid var(--border-color);
    border-radius:14px; padding:1.8vh 5vw; display:flex; align-items:center;
    justify-content:center; gap:2.5vw; width:calc(100% - 12vw); flex-shrink:0;
    font-family:'Inter',sans-serif; position:relative; overflow:hidden;
  }
  .cta-title{ text-align:center; font-size:var(--fs-cta-title); font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:var(--cta-text); }
  .cta-arrow{ color:var(--gold-soft); font-size:4.5vw; flex-shrink:0; }

  /* Brillo/foil que recorre el botón cada pocos segundos, para darle dinamismo
     y llamar la atención sin depender de íconos ni emojis. Barra diagonal
     angosta que atraviesa el botón y se queda "apagada" (fuera de pantalla)
     el resto del ciclo — no es un loop continuo, es un guiño periódico. */
  .cta-shine{
    position:absolute; top:0; left:-40%; width:26%; height:100%;
    background:linear-gradient(100deg, transparent 0%, rgba(255,255,255,0.75) 50%, transparent 100%);
    transform:skewX(-20deg); pointer-events:none;
    animation:ctaShineSweep 5s var(--motion-ease) infinite; /* período de 5s documentado en Display_Instrucciones; curva única (LEY 8) */
  }
  @keyframes ctaShineSweep{
    0%{ left:-40%; }
    18%{ left:140%; }
    100%{ left:140%; }
  }

  /* LEY 8 — microinteracción táctil universal: todo elemento interactivo
     aplica transform:scale(0.97) en :active, a duración fast con la curva única. */
  .badge, .back-link, .info-close, .cta-detail, .hotspot-number{
    transition:transform var(--motion-fast) var(--motion-ease);
  }
  .badge:active, .back-link:active, .info-close:active, .cta-detail:active{
    transform:scale(0.97);
  }
  /* El número de hotspot ya usa translate(-50%,-50%) para centrarse sobre su
     coordenada proyectada — el :active debe conservarlo y componer el scale. */
  .hotspot-number:active{
    transform:translate(-50%,-50%) scale(0.97);
  }

  /* LEY 8 — todo movimiento del sistema se anula bajo prefers-reduced-motion,
     sin excepciones: animaciones, transiciones y shimmer (queda el placeholder
     gris estático). */
  @media (prefers-reduced-motion: reduce){
    *, *::before, *::after{ animation:none !important; transition:none !important; }
    .cta-shine{ display:none; }
    .shimmer::after{ display:none; }
  }

<body class="has-bg-display">
<!-- BT Mangle Rojo (sección 3): este D usa imagen de fondo (assets/bg-display.png,
     pendiente de recibir del cliente). theme-color arriba ya está seteado al color
     de borde superior indicado en el BT (#F6F3EF = --bg). Mientras el asset no esté
     subido, el fallback sólido de LEY 3 (--bg en <body>) cubre el hueco sin costura. -->

<!-- Sprite de íconos STD (SVG de línea fina, cero emojis). #ic-close se usa en el
     botón de cierre de TODOS los popups (badge y hotspots). Si a futuro se suman
     íconos, se agregan como <symbol> acá y se referencian con <use>. -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true" focusable="false">
  <symbol id="ic-close" viewBox="0 0 24 24">
    <line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  </symbol>
</svg>

<!-- Imagen de fondo opcional (activada por BT). Hermano de .screen, NUNCA
     descendiente. Sangra por detrás del chrome de Safari (viewport-fit=cover). -->
<div class="bg-display" aria-hidden="true"></div>

<div class="screen">

  <header>
    <div class="logo">
      <!-- Logo del cliente: siempre PNG con transparencia, subido a assets/logo.png.
           El logo ya comunica la identidad de marca por sí solo — no se repite el
           nombre del cliente como texto al lado (a diferencia de versiones anteriores
           del STD que mostraban logo + nombre en 3 líneas). -->
      <img class="logo-mark" src="assets/logo.png" alt="Logo">
    </div>
    <div class="back-link">
      <span class="arrow">&#8592;</span>
      <span>volver al escáner</span>
    </div>
  </header>

  <div class="title-block">
    <button class="badge" id="badgeBtn" type="button">Casi amenazado</button>
    <h1>Mangle rojo</h1>
    <div class="rule"></div>
    <!-- BT (Nota 1): el campo "Subtítulo" del BT es el nombre científico, en
         itálica. La segunda línea de clasificación (nombre científico + línea
         con ícono "Familia X") que la Nota 1 menciona como extensión a futuro
         no tiene contenido concreto en este BT (sin nombre de familia ni ícono
         definidos) — se trata como no definido y no se agrega, para no inventar
         estructura no pedida con datos reales. Solo se aplica la itálica al
         subtítulo existente, vía override puntual de esta pieza (sin tocar el
         CSS compartido .subtitle de otros D). -->
    <div class="subtitle" style="font-style:italic; text-transform:none;">Rhizophora samoensis</div>
  </div>

  <!-- Info box del badge: oculto por defecto, aparece al tocar el badge. -->
  <div class="info-overlay" id="infoOverlay">
    <div class="info-box">
      <button class="info-close" id="infoClose" type="button" aria-label="Cerrar"><svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><use href="#ic-close"/></svg></button>
      <div class="info-box-badge">Casi amenazado</div>
      <!-- BT: texto del popup de badge PENDIENTE (sin contenido visible en la
           referencia) — placeholder neutro, no se inventa justificación real. -->
      <p>Contenido pendiente.</p>
    </div>
  </div>

  <!-- Popups de hotspots: generados dinámicamente desde JS según HOTSPOTS_3D (ver
       abajo) — la cantidad real depende del BT de cada pieza, nunca se escriben a
       mano en este HTML. Cada uno tiene título + imagen (con fallback a placeholder
       si el asset todavía no fue subido) + texto descriptivo. -->
  <div id="hotspotPopupsContainer"></div>

  <div class="viewer-wrap">
    <div id="viewer3d">
      <!-- Estado de carga: placeholder elíptico con shimmer en la zona del suelo
           + % de progreso. Ambos se eliminan cuando el GLB termina de cargar
           (con éxito o con error). -->
      <div class="viewer-shimmer shimmer" id="viewerShimmer"></div>
      <div class="loading-msg" id="loadingMsg">Cargando modelo 3D…</div>
    </div>

    <!-- Sombra y anillo viven en DOS SVG separados, pero con el MISMO viewBox
         ("0 0 300 130") y las MISMAS coordenadas numéricas (centro real del
         círculo en 150,71). Esto garantiza que comparten exactamente el mismo
         origen por construcción matemática. Su tamaño y posición en pantalla
         NO se fijan por CSS: los calcula el JS (regla E3 de la Ley de Encuadre)
         proyectando a pantalla el punto (0,0,0) del mundo — el plano del suelo
         donde apoya la base del modelo — al cargar y en cada resize, y derivando
         el ancho del footprint proyectado de la base. Se separan en dos SVG (no
         uno) únicamente para poder darles z-index distintos: la sombra debe
         quedar DEBAJO del modelo 3D, el anillo ENCIMA — si fueran el mismo SVG,
         comparten z-index y no se puede intercalar el canvas entre ambos. -->

    <!-- SVG 1: sombra, z-index bajo (ver CSS .shadow-plane), debajo del canvas. -->
    <svg class="shadow-plane" viewBox="0 0 300 130" preserveAspectRatio="xMidYMid meet">
      <defs>
        <radialGradient id="shadowGradient" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#000000" stop-opacity="1"/>
          <stop offset="65%" stop-color="#000000" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <ellipse cx="150" cy="71" rx="145" ry="27.6" fill="url(#shadowGradient)"/>
    </svg>

    <!-- SVG 2: anillo, z-index alto, encima del canvas. Mismo viewBox/coordenadas
         que el SVG de la sombra, por eso ambos quedan centrados en el mismo punto. -->
    <svg class="rotate-arc-ring" viewBox="0 0 300 130" preserveAspectRatio="xMidYMid meet">
      <!-- Anillo de rotación: CINTA rellena de ancho VARIABLE (un único contorno relleno,
           no un trazo constante). Arco sólido de -45° a 225° (gap de 90° arriba/lejos).
           Grosor máximo 1.6 desde el extremo del arco hasta (±R,0); de ahí DECAE
           EXPONENCIALMENTE (k=4) hacia el punto de grosor cero (abajo, 0,-R, el más
           cercano a la cámara), quedando casi invisible en un arco amplio alrededor de
           ese punto. Flechas en ambos extremos, orientadas por la tangente real de la
           elipse. Cinta + flechas comparten opacidad vía <g opacity> (nunca opacidades
           distintas por elemento). Misma elipse (centro 150,71 / rx 121 / ry 23.1) que
           la sombra, para compartir origen por construcción. Generado paramétricamente
           (gen_ring.py): CX,CY=150,71 · RX,RY=121,23.1 · G_MAX=1.6 · K=4. SVG estático,

<script>
  // Bloqueo adicional de zoom vía JS: la meta tag de viewport y touch-action CSS
  // a veces no son suficientes en navegadores modernos (iOS 10+/Chrome 61+ ignoran
  // parcialmente user-scalable=no por accesibilidad). Esto cubre el caso de gestos
  // de pellizco con 2+ dedos en cualquier parte de la página.
  document.addEventListener('touchmove', (e) => {
    if (e.touches.length > 1) e.preventDefault();
  }, { passive: false });

  // Bloqueo de doble-tap-para-zoom: si dos toques ocurren muy cerca en el tiempo,
  // se previene el comportamiento default del segundo.
  let lastTouchEnd = 0;
  document.addEventListener('touchend', (e) => {
    const now = Date.now();
    if (now - lastTouchEnd <= 300) e.preventDefault();
    lastTouchEnd = now;
  }, { passive: false });
</script>

<script>
  // Captura cualquier error de JS (incluyendo errores de carga de módulos ES,
  // que en Safari móvil pueden fallar silenciosamente sin pasar por los catch normales)
  // y lo muestra en pantalla, ya que no podemos abrir la consola del navegador fácil en un celular.
  // Todos los mensajes de error del visor pasan por este helper. Los textos se
  // arman SIEMPRE con textContent/nodos DOM — nunca inyectando strings externos
  // (mensajes de excepción, la URL del modelo) vía innerHTML (ver Manejo de
  // Errores, Arquitectura_de_Archivo_Unico.pdf). También retira el shimmer de
  // carga, que solo tiene sentido mientras hay una descarga en curso.
  function showViewerError(mainText, detailText) {
    const shimmer = document.getElementById('viewerShimmer');
    if (shimmer) shimmer.remove();
    const el = document.getElementById('loadingMsg');
    if (!el) return;
    el.className = 'error-msg';
    el.textContent = mainText;
    if (detailText) {
      el.appendChild(document.createElement('br'));
      const detail = document.createElement('span');
      detail.style.fontSize = '0.75em';
      detail.style.opacity = '0.7';
      detail.textContent = detailText;
      el.appendChild(detail);
    }
  }

  window.addEventListener('error', (e) => {
    showViewerError('Error JS: ' + (e.message || 'desconocido'), (e.filename || '') + ':' + (e.lineno || ''));
  });
  window.addEventListener('unhandledrejection', (e) => {
    showViewerError('Promesa rechazada: ' + ((e.reason && e.reason.message) || e.reason || 'desconocido'));
  });

  // Badge "Pieza complementaria" → abre/cierra el info box con la descripción,
  // que se sacó de la pantalla principal para mantenerla más limpia.
  const badgeBtn = document.getElementById('badgeBtn');
  const infoOverlay = document.getElementById('infoOverlay');
  const infoClose = document.getElementById('infoClose');

  badgeBtn?.addEventListener('click', () => infoOverlay.classList.add('open'));
  infoClose?.addEventListener('click', () => infoOverlay.classList.remove('open'));
  infoOverlay?.addEventListener('click', (e) => {
    if (e.target === infoOverlay) infoOverlay.classList.remove('open'); // cerrar tocando fuera de la caja
  });

  // Divisor del título (.rule): su ancho = 110% del ancho REAL del texto del h1.
  // En CSS puro no se puede tomar el ancho del texto (el h1 es block y ocupa todo
  // el contenedor), así que lo medimos con un Range sobre el contenido del h1 y
  // seteamos --rule-width. Se recalcula en load, en resize y al resolverse las
  // fuentes (document.fonts.ready), debounced — mismas condiciones que las otras
  // rutinas del sistema. El centrado lo mantiene margin:auto del propio .rule.
  (function(){
    const h1 = document.querySelector('.title-block h1');
    const root = document.documentElement;
    if (!h1) return;
    let t = 0;
    function measureRule(){
      const range = document.createRange();
      range.selectNodeContents(h1);
      const w = range.getBoundingClientRect().width;
      if (w > 0) root.style.setProperty('--rule-width', (w * 1.1) + 'px');
    }
    function schedule(){ clearTimeout(t); t = setTimeout(measureRule, 120); }
    window.addEventListener('resize', schedule);
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(measureRule);
    measureRule();
  })();
</script>

<script type="module">
  import * as THREE from 'three';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
  import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
  import { KTX2Loader } from 'three/addons/loaders/KTX2Loader.js';

  document.getElementById('loadingMsg').textContent = 'Módulos cargados. Iniciando escena 3D…';

  // URL del modelo 3D real (BT sección 9 / checklist de assets): el cliente
  // debe subir el archivo con este nombre exacto a displays/mangle-rojo/assets/.
  const MODEL_URL = 'assets/mangle_model.glb';

  if (!MODEL_URL) {
    showViewerError('MODEL_URL no fue completado.', 'Reemplazá la constante MODEL_URL con la URL real del .glb de esta pieza.');
    throw new Error('MODEL_URL vacío — completar antes de desplegar.');
  }

  const mount = document.getElementById('viewer3d');
  const loadingMsg = document.getElementById('loadingMsg');

  const w = mount.clientWidth;
  const h = mount.clientHeight;

  const scene = new THREE.Scene();
  // Parámetros no negociables de cámara (Display_Instrucciones): fov 45,
  // near 0.1, far 100, distancia fija z=4. La ALTURA de la cámara no es fija:
  // la regla E2 de la Ley de Encuadre la eleva a la mitad de la altura final
  // del modelo (ver applyFraming), mirando siempre horizontal — nunca inclinada.
  const CAMERA_DISTANCE = 4;
  const camera = new THREE.PerspectiveCamera(45, w / h, 0.1, 100);
  camera.position.set(0, 0, CAMERA_DISTANCE);

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(w, h);
  // PRUEBA: DPR tope subido de 2 a 3 para dibujar a la resolución nativa de
  // pantallas 3x (la mayoría de iPhones recientes) — antes se dibujaba a 2/3 de
  // esa resolución y se estiraba, lo que ablandaba todo el follaje. Costo: dibujar
  // a 3x son (3/2)²=2.25x más píxeles por cuadro que a 2x — más carga de GPU y
  // batería. Ver el contador de FPS en pantalla (temporal, para esta prueba) para
  // decidir si el celular lo banca fluido o si hay que volver a 2.
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 3));
  // Curva de tono: sin esto three.js usa NoToneMapping (linear→sRGB directo), que
  // aplana los medios, baja el contraste y corta los brillos — las piezas de arte
  // oscuras/saturadas (ej. mangle rojo) se ven "lavadas" frente al viewport de
  // Blender, que usa AgX. AgXToneMapping replica esa curva (medios más oscuros,
  // más contraste, rolloff suave de altas). Global para todas las piezas.
  renderer.toneMapping = THREE.AgXToneMapping;
  renderer.toneMappingExposure = 1.0;
  mount.appendChild(renderer.domElement);

  // Lever B — más contraste de luz: se baja el ambiente (antes 1.6) y se sube la
  // key direccional (antes 1.8), subiendo la relación direccional/ambiente. Eso
  // hunde las sombras entre hoja y hoja (de ahí sale la "definición" de Blender) y
  // deja que se lean los normal maps, sin apagar las hojas iluminadas. El fill baja
  // un poco (antes 0.9) para no rellenar de más las sombras que acabamos de crear.
  scene.add(new THREE.AmbientLight(0xffffff, 0.7));
  const dirLight = new THREE.DirectionalLight(0xffffff, 2.2);
  dirLight.position.set(3, 5, 4); // ángulo normal de 3/4 — ya no necesita ser cenital, no hay sombra que cuidar
  scene.add(dirLight);
  const fillLight = new THREE.DirectionalLight(0xffffff, 0.6);
  fillLight.position.set(-3, 1, -2);
  scene.add(fillLight);

  // Environment map generado por código (sin imagen externa): metales con metalness
  // alto necesitan algo que reflejar, o se ven planos/oscuros sin importar las luces.
  // RoomEnvironment da un entorno neutro tipo "habitación" que sirve para esto.
  const pmremGenerator = new THREE.PMREMGenerator(renderer);
  const envScene = new THREE.Scene();
  envScene.background = new THREE.Color(0xf0f0f0);
  const envLight1 = new THREE.PointLight(0xffffff, 800, 20);
  envLight1.position.set(5, 5, 5);
  envScene.add(envLight1);
  const envLight2 = new THREE.PointLight(0xffffff, 400, 20);
  envLight2.position.set(-5, 3, -5);
  envScene.add(envLight2);
  const envTexture = pmremGenerator.fromScene(envScene, 0.04).texture;
  scene.environment = envTexture;
  pmremGenerator.dispose();

  const modelGroup = new THREE.Group();
  scene.add(modelGroup);

  // ---------- LEY DE ENCUADRE — geometría de base (E4) ----------
  // E4 — Base robusta por percentil: la "base real" del modelo no es box.min.y
  // sino el percentil 1 de las coordenadas Y de todos los vértices (en espacio
  // local del modelo, antes de escalar/posicionar). Motivo: un único vértice
  // espurio de un export sucio no debe definir el plano de apoyo de toda la
  // pieza. Si una pieza requiriera corrección manual, el GLB se considera
  // defectuoso y se re-exporta desde Blender — la corrección nunca es un
  // parámetro del D.
  function computeRobustBaseY(model, box) {
    const ys = [];
    const v = new THREE.Vector3();
    model.updateMatrixWorld(true);
    model.traverse((node) => {
      if (!node.isMesh || !node.geometry) return;
      const posAttr = node.geometry.attributes.position;
      if (!posAttr) return;
      for (let i = 0; i < posAttr.count; i++) {
        v.fromBufferAttribute(posAttr, i);
        v.applyMatrix4(node.matrixWorld); // matrixWorld acá es relativo a "model" (todavía no agregado a modelGroup/scene)
        ys.push(v.y);
      }
    });
    if (ys.length === 0) return box.min.y; // sin geometría legible: caer al bounding box
    const sorted = Float64Array.from(ys).sort();
    return sorted[Math.min(sorted.length - 1, Math.floor(sorted.length * 0.01))];
  }

  // Footprint de la base: centro XZ y radio máximo de los vértices ubicados en
  // la banda inferior del 8% de la altura, medida DESDE LA BASE ROBUSTA (E4).
  // El centro se usa para el centrado horizontal del modelo; el radio, para
  // derivar el ancho del anillo (footprint proyectado — ver positionGroundOverlays).
  // Motivo del centrado por footprint: en piezas de geometría asimétrica (ej.
  // una mano con dedos extendidos hacia un costado), el centro del bounding box
  // completo puede caer lejos de donde el objeto realmente "pisa" el suelo, y
  // centrar por ahí deja la pieza visualmente descentrada aunque matemáticamente
  // esté bien centrada. thresholdFraction=0.08 fue validado como suficiente para
  // capturar la base sin incluir geometría del cuerpo principal en piezas ya
  // probadas (bandeja, mano escultórica).
  function computeBaseFootprint(model, box, baseY, thresholdFraction = 0.08) {
    const yThreshold = baseY + (box.max.y - baseY) * thresholdFraction;
    const bandX = [], bandZ = [];
    const v = new THREE.Vector3();

    model.updateMatrixWorld(true);
    model.traverse((node) => {
      if (!node.isMesh || !node.geometry) return;
      const posAttr = node.geometry.attributes.position;
      if (!posAttr) return;
      for (let i = 0; i < posAttr.count; i++) {
        v.fromBufferAttribute(posAttr, i);
        v.applyMatrix4(node.matrixWorld);
        if (v.y <= yThreshold) {
          bandX.push(v.x);
          bandZ.push(v.z);
        }
      }
    });

    if (bandX.length === 0) {
      // Fallback si no se encontró geometría en la franja (caso raro): usar el
      // centro y radio del bounding box completo antes que fallar.
      const c = box.getCenter(new THREE.Vector3());
      const s = box.getSize(new THREE.Vector3());
      return { x: c.x, z: c.z, radius: Math.max(s.x, s.z) / 2 };
    }

    let sumX = 0, sumZ = 0;
    for (let i = 0; i < bandX.length; i++) { sumX += bandX[i]; sumZ += bandZ[i]; }
    const cx = sumX / bandX.length;
    const cz = sumZ / bandZ.length;
    let maxR2 = 0;
    for (let i = 0; i < bandX.length; i++) {
      const dx = bandX[i] - cx, dz = bandZ[i] - cz;
      const r2 = dx * dx + dz * dz;
      if (r2 > maxR2) maxR2 = r2;
    }
    return { x: cx, z: cz, radius: Math.sqrt(maxR2) };
  }

  // ---------- LEY DE ENCUADRE — Perfiles de Composición ----------
  // El visor clasifica automáticamente cada pieza según su proporción
  // P = size.y / max(size.x, size.z) y ajusta las fracciones de encuadre:
  //   vertical    (P > 1.4)        → 0.70 ancho / 0.84 alto
  //   equilibrado (0.7 ≤ P ≤ 1.4)  → 0.70 ancho / 0.83 alto
  //   horizontal  (P < 0.7)        → 0.66 ancho / 0.74 alto, anillo con radio ×1.1
  // El BT puede pisar el perfil explícitamente vía COMPOSITION_PROFILE_OVERRIDE
  // ('vertical' | 'equilibrado' | 'horizontal'); por defecto es automático.
  const COMPOSITION_PROFILES = {
    vertical:    { widthFraction: 0.70, heightFraction: 0.84, ringFactor: 1.0 },
    equilibrado: { widthFraction: 0.70, heightFraction: 0.83, ringFactor: 1.0 },
    horizontal:  { widthFraction: 0.66, heightFraction: 0.74, ringFactor: 1.1 },
  };
  const COMPOSITION_PROFILE_OVERRIDE = ''; // vacío = automático; el BT puede pisarlo

  function resolveCompositionProfile(size) {
    if (COMPOSITION_PROFILE_OVERRIDE && COMPOSITION_PROFILES[COMPOSITION_PROFILE_OVERRIDE]) {
      return COMPOSITION_PROFILES[COMPOSITION_PROFILE_OVERRIDE];
    }
    const P = size.y / Math.max(size.x, size.z);
    if (P > 1.4) return COMPOSITION_PROFILES.vertical;
    if (P < 0.7) return COMPOSITION_PROFILES.horizontal;
    return COMPOSITION_PROFILES.equilibrado;
  }

  // Datos geométricos del modelo en su espacio LOCAL (sin escala), calculados
  // una sola vez al cargar. El encuadre (applyFraming) los reutiliza en cada
  // resize sin volver a recorrer la geometría.
  let loadedModel = null;
  let modelGeom = null;       // { size, baseY, topY, footprint:{x,z,radius}, profile }
  let currentScale = 0;       // escala vigente (para re-escalar anclajes de hotspots en resize)
  let currentModelHeight = 0; // altura final del modelo ya escalado (base robusta → tope)

  // ---------- LEY DE ENCUADRE — E1 / E2 / E3 ----------
  // El modelo, la cámara y el sistema sombra+anillo se vinculan matemáticamente
  // entre sí. Ningún elemento del encuadre se posiciona a ojo ni con constantes
  // manuales por pieza. Se ejecuta al terminar la carga del modelo y en cada
  // resize (debounced).
  function applyFraming() {
    if (!loadedModel || !modelGeom) return;
    const { size, baseY, topY, footprint, profile } = modelGeom;

    // E1 — Escala por doble restricción: se calcula dos veces y gana la menor.
    // Restringir solo el ancho haría que piezas altas y angostas (árboles,
    // esculturas verticales) excedan el alto del canvas y se corten. Las
    // fracciones de ancho/alto las define el Perfil de Composición (0.63/0.78
    // default). Dimensión visible a distancia d = 2·d·tan(fov/2) (× aspect
    // para el ancho) — fórmula del frustum de una cámara perspectiva.
    const vFov = (camera.fov * Math.PI) / 180;
    const visibleHeight = 2 * Math.tan(vFov / 2) * CAMERA_DISTANCE;
    const visibleWidth = visibleHeight * camera.aspect;
    const scaleH = (visibleWidth * profile.widthFraction) / Math.max(size.x, size.z);
    const scaleV = (visibleHeight * profile.heightFraction) / size.y;
    const scale = Math.min(scaleH, scaleV);

    loadedModel.scale.setScalar(scale);

    // APOYO EXACTO EN EL PLANO DEL SUELO (prioridad alta, no negociable): la
    // base robusta del modelo (E4) cae exactamente en y=0, el mismo plano donde
    // viven la sombra y el anillo de rotación. CENTRADO HORIZONTAL POR EL
    // FOOTPRINT DE LA BASE, no por el centro geométrico de toda la silueta:
    // puede dejar partes lejanas del objeto (ej. dedos extendidos) más cerca de
    // un borde de pantalla que del otro — trade-off aceptado: la base estable y
    // centrada bajo el anillo tiene prioridad sobre la simetría lateral.
    loadedModel.position.y = -baseY * scale;
    loadedModel.position.x = -footprint.x * scale;
    loadedModel.position.z = -footprint.z * scale;

    const modelHeight = (topY - baseY) * scale;

    // E2 — Cámara a media altura, nunca inclinada: se eleva a la mitad de la
    // altura final del modelo y mira horizontal (lookAt a su misma altura).
    // Prohibido inclinarla: la inclinación hace converger las líneas verticales
    // de la pieza, efecto inaceptable en piezas de museo. Con la cámara fija en
    // y=0, todo modelo apoyado quedaría por encima del centro del canvas.
    camera.position.set(0, modelHeight / 2, CAMERA_DISTANCE);
    camera.lookAt(0, modelHeight / 2, 0);

    // Los anclajes de hotspots ya calculados viven en el espacio de modelGroup
    // y escalan linealmente con el modelo: en un resize alcanza con
    // re-escalarlos, sin repetir el raycasting.
    if (currentScale > 0 && scale !== currentScale) {
      const ratio = scale / currentScale;
      Object.values(hotspotAnchorsLocal).forEach((a) => a.multiplyScalar(ratio));
      if (modelCenterForHotspots) modelCenterForHotspots.multiplyScalar(ratio);
    }
    currentScale = scale;
    currentModelHeight = modelHeight;

    positionGroundOverlays();
  }

  // E3 — Anclaje proyectado de sombra y anillo: el centro de la elipse de ambos
  // SVG (punto 150,71 de su viewBox de 300×130) se hace coincidir con la
  // proyección a pantalla del punto del mundo (0,0,0) — donde apoya la base del
  // modelo. Prohibido anclar estos SVG con porcentajes CSS (bottom:8% y
  // similares) o con constantes de corrección vertical manual.
  const RING_CENTER_Y_FRACTION = 71 / 300;  // cy de la elipse respecto del ancho del elemento SVG
  const RING_DIAMETER_FRACTION = 242 / 300; // diámetro del anillo (2×rx=242) respecto del ancho del elemento SVG
  const RING_RADIUS_BOOST = 1.10;           // el anillo se dibuja 10% más grande que el footprint proyectado (además del ringFactor del perfil); el clamp 55–96% se respeta igual

  function positionGroundOverlays() {
    if (!modelGeom || currentScale <= 0) return;

    // Ancho del anillo derivado del FOOTPRINT PROYECTADO de la base (banda
    // inferior del 8%), no del bounding box completo: en piezas verticales (un
    // árbol), un anillo dimensionado por el ancho total de la copa quedaría
    // gigante respecto del tronco que realmente pisa el suelo.
    const rWorld = modelGeom.footprint.radius * currentScale;
    const leftPt = projectToScreen(new THREE.Vector3(-rWorld, 0, 0));
    const rightPt = projectToScreen(new THREE.Vector3(rWorld, 0, 0));
    const footprintPx = Math.abs(rightPt.x - leftPt.x);

    // El diámetro visible del anillo circunscribe el footprint proyectado
    // (× el factor del perfil — 1.1 en horizontal), y el ancho total del
    // elemento SVG se deriva de esa proporción fija de su viewBox.
    // Clamp: mínimo 55% y máximo 96% del ancho del visor.
    const viewerWidth = mount.clientWidth;
    const idealWidth = (footprintPx * modelGeom.profile.ringFactor * RING_RADIUS_BOOST) / RING_DIAMETER_FRACTION;
    const svgWidth = Math.max(viewerWidth * 0.55, Math.min(viewerWidth * 0.96, idealWidth));

    const origin = projectToScreen(new THREE.Vector3(0, 0, 0));
    const topPx = origin.y - svgWidth * RING_CENTER_Y_FRACTION;

    document.querySelectorAll('.shadow-plane, .rotate-arc-ring').forEach((el) => {
      el.style.width = `${svgWidth}px`;
      el.style.top = `${topPx}px`;
      el.style.visibility = 'visible';
    });
  }

  const loader = new GLTFLoader();

  // Soporte permanente para .glb comprimidos — muy común en modelos bajados
  // de Sketchfab u optimizados con herramientas externas. Un visor GLB
  // genérico trae estos decodificadores incluidos por default; GLTFLoader
  // solo, no. No tiene costo si el .glb en cuestión no usa ninguno de los dos.
  const dracoLoader = new DRACOLoader();
  dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/libs/draco/');
  loader.setDRACOLoader(dracoLoader);

  const ktx2Loader = new KTX2Loader();
  ktx2Loader.setTranscoderPath('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/libs/basis/');
  ktx2Loader.detectSupport(renderer);
  loader.setKTX2Loader(ktx2Loader);
  let loadResolved = false;

  const timeoutId = setTimeout(() => {
    if (!loadResolved) {
      showViewerError('El modelo está demorando demasiado o no responde.', MODEL_URL);
    }
  }, 15000);

  // Material de la pieza — COMPLETAR según el BT (ver tabla 4.4 del STD: metal
  // pulido/brillante 0.7-0.9 / 0.1-0.3, metal patinado 0.2-0.4 / 0.5-0.7,
  // cerámica/piedra/madera ~0 / 0.7-0.9). Valores neutros de partida: ni muy
  // metálico ni muy rugoso, para que un D sin BT de material aplicado todavía
  // no se vea con un acabado completamente errado.
  // Material (BT sección 2): madera/orgánico — default de tabla STD, sin excepción.
  const MATERIAL_CONFIG = {
    metalness: 0,
    roughness: 0.75, // dentro de tabla 4.4 STD (madera/orgánico 0.7-0.9); el satén de las
    // hojas se recupera con la luz (envMapIntensity, contraste direccional), no con este valor
  };

  // Aplica el MATERIAL_CONFIG de la pieza a los materiales PBR ESTÁNDAR
  // (metallicRoughness), que son los que NO pasan por applySpecGlossTextureManually.
  // Sin esto, un GLB que no exporta roughnessFactor ni mapa de roughness (como el
  // mangle) se queda con el default de three.js roughness=1.0 (mate total) y las
  // hojas pierden todo el satén que sí se ve en Blender. Cierra el hueco por el que
  // MATERIAL_CONFIG solo llegaba a los modelos spec/gloss.
  function applyMaterialConfigToStandard(model) {
    // Filtrado anisotrópico: sin esto, las texturas vistas en ángulo rasante
    // (hojas casi de canto respecto de la cámara, muy frecuente en un follaje
    // denso) se ven borrosas — el filtrado normal (trilinear) promedia de forma
    // pareja en todas direcciones y pierde detalle cuando el ángulo es oblicuo.
    // Costo: prácticamente nulo (es trabajo de la GPU de muestreo de textura,
    // no de sombreado por píxel como el DPR) — por eso se aplica siempre, a
    // diferencia del cambio de resolución que si se evalúa por costo/beneficio.
    const maxAniso = renderer.capabilities.getMaxAnisotropy();
    model.traverse((node) => {
      if (!node.isMesh || !node.material) return;
      const materials = Array.isArray(node.material) ? node.material : [node.material];
      materials.forEach((mat) => {
        if (!mat.isMeshStandardMaterial) return;
        mat.metalness = MATERIAL_CONFIG.metalness;
        mat.roughness = MATERIAL_CONFIG.roughness;
        // Baja la influencia del environment map (cúpula casi blanca generada por
        // código). Con el default 1.0 ese entorno inunda el modelo con luz pareja y
        // tapa las luces direccionales, aplanando el follaje y las raíces. A 0.4 la
        // key direccional recupera el mando y aparecen las sombras que dan la
        // "definición" tipo Blender, sin apagar las hojas iluminadas.
        mat.envMapIntensity = 0.4;
        if (mat.map) mat.map.anisotropy = maxAniso;
        if (mat.normalMap) mat.normalMap.anisotropy = maxAniso;
        mat.needsUpdate = true;
      });
    });
  }

  // GLTFLoader (a partir de cierta versión de three.js) dejó de soportar la extensión
  // KHR_materials_pbrSpecularGlossiness: carga la geometría perfecto, pero ignora la
  // textura difusa de ese material (se ve gris plano). Esta función la aplica a mano,
  // leyendo el JSON crudo del GLTF que el parser ya descargó y decodificó.
  async function applySpecGlossTextureManually(gltf) {
    const json = gltf.parser.json;
    if (!json.extensionsUsed || !json.extensionsUsed.includes('KHR_materials_pbrSpecularGlossiness')) {
      return; // El modelo no usa esta extensión, no hay nada que parchear.
    }

    for (let matIndex = 0; matIndex < (json.materials || []).length; matIndex++) {
      const matDef = json.materials[matIndex];
      const specGloss = matDef.extensions && matDef.extensions.KHR_materials_pbrSpecularGlossiness;
      if (!specGloss || specGloss.diffuseTexture == null) continue;

      // parser.getDependency('texture', index) descarga y decodifica la textura
      // referenciada, devolviendo un THREE.Texture ya listo para usar.
      const diffuseTex = await gltf.parser.getDependency('texture', specGloss.diffuseTexture.index);
      diffuseTex.colorSpace = THREE.SRGBColorSpace;

      // Aplicamos esta textura a todos los meshes que usan este material por índice.
      gltf.scene.traverse((node) => {
        if (node.isMesh && node.material) {
          const materials = Array.isArray(node.material) ? node.material : [node.material];
          materials.forEach((mat) => {
            // GLTFLoader nombra los materiales según el glTF original, así que
            // comparamos por nombre (más confiable acá que por índice interno de three.js).
            if (mat.name === matDef.name) {
              mat.map = diffuseTex;
              mat.color.set(0xffffff); // blanco para no tintar la textura
              // GLTFLoader, al no entender esta extensión, deja metalness/roughness
              // en valores por defecto que oscurecen la textura real. Los tomamos
              // de MATERIAL_CONFIG (arriba), que es lo único que el BT debe tocar.
              mat.metalness = MATERIAL_CONFIG.metalness;
              mat.roughness = MATERIAL_CONFIG.roughness;
              mat.needsUpdate = true;
            }
          });
        }
      });
    }
  }

  // ---------- HOTSPOTS ANCLADOS EN 3D ----------
  // Coordenadas en el espacio LOCAL del modelo, definidas como fracciones del
  // tamaño del modelo (0 a 1 en cada eje) en vez de unidades absolutas — así
  // funcionan igual sin importar la escala real de cada GLB que carguemos a futuro.
  // x: 0 = izquierda, 1 = derecha. y: 0 = abajo, 1 = arriba. z: 0 = atrás, 1 = adelante.
  // Cada hotspot se define por una dirección angular desde el centro del modelo
  // (azimuth: ángulo horizontal en grados, 0=adelante, 90=derecha, etc.;
  // heightFraction: 0=base del modelo, 1=tope del modelo) en vez de coordenadas
  // de bounding box — esto permite anclar el punto a la SUPERFICIE REAL de la
  // pieza vía raycasting, en vez de caer "en el aire" dentro de una caja rectangular
  // que no sigue la forma curva del objeto.
  // HOTSPOTS_3D es la ÚNICA fuente de verdad para los hotspots de este D — tanto
  // su posición sobre el modelo (azimuthDeg/heightFraction) como el contenido de
  // su popup (popupTitle/popupText/popupImage). El BT de cada pieza define esta
  // lista completa; nada de esto se duplica a mano en el HTML.
  // BT Mangle Rojo, sección 7. azimuthDeg/heightFraction estimados por análisis
  // de vértices sobre mangle_model.glb (no a ojo, ver nota al inicio del archivo):
  // - Hotspot 1 (raíces fúlcreas): banda de la base (0–8% de altura) con mayor
  //   densidad de puntos hacia azimut 120°–180°; se tomó 160°.
  // - Hotspot 2 (hojas opuestas): follaje denso concentrado cerca de azimut
  //   0°–30°, en la mitad superior de la copa.
  // - Hotspot 3 (flor y propágulo): único clúster geométrico aislado del resto
  //   del follaje (malla pequeña y separada espacialmente) — azimut ≈300°,
  //   altura ≈50%, el candidato más consistente con un elemento puntual
  //   distinto (flor/propágulo) en vez de follaje masivo repetido.
  const HOTSPOTS_3D = [
    { id: 'hotspot-1', azimuthDeg: 160, heightFraction: 0.05, label: 'Raíces fúlcreas',
      popupTitle: 'Raíces fúlcreas',
      popupText: 'Raíces en forma de arco que emergen del tronco y ramas para dar soporte y estabilidad en suelos fangosos.',
      popupImage: 'assets/hotspot-1.jpg' },
    { id: 'hotspot-2', azimuthDeg: 20,  heightFraction: 0.68, label: 'Hojas opuestas',
      popupTitle: 'Hojas opuestas',
      // BT: texto PENDIENTE (solo el label es visible en la referencia) — placeholder neutro.
      popupText: 'Contenido pendiente.',
      popupImage: 'assets/hotspot-2.jpg' },
    { id: 'hotspot-3', azimuthDeg: 300, heightFraction: 0.50, label: 'Flor y propágulo',
      popupTitle: 'Flor y propágulo',
      // BT: texto PENDIENTE (mismo caso que Hotspot 2) — placeholder neutro.
      popupText: 'Contenido pendiente.',
      popupImage: 'assets/hotspot-3.jpg' },
  ];

  const hotspotContainer = document.getElementById('hotspots3d');
  const hotspotElements = {}; // { numberEl, anchorEl, lineEl }
  let modelBoxForHotspots = null; // se completa una vez que el modelo carga (ver loader.load abajo)
  let modelCenterForHotspots = null;

  // SVG compartido para todas las líneas de los hotspots — un solo elemento
  // que cubre todo el viewer-wrap, con una línea por hotspot dentro.
  const hotspotSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  hotspotSvg.setAttribute('style', 'position:absolute; inset:0; width:100%; height:100%; pointer-events:none; overflow:visible;');
  hotspotContainer.appendChild(hotspotSvg);

  // Genera dinámicamente un popup por cada hotspot definido en HOTSPOTS_3D —
  // misma estructura visual que el popup de badge (overlay + info-box + cierre),
  // pero la cantidad real depende de cuántos hotspots tenga este D en particular.
  function createHotspotPopups() {
    const container = document.getElementById('hotspotPopupsContainer');
    HOTSPOTS_3D.forEach((h) => {
      const overlay = document.createElement('div');
      overlay.className = 'info-overlay';
      overlay.id = `popup-${h.id}`;

      overlay.innerHTML = `
        <div class="info-box">
          <button class="info-close" type="button" aria-label="Cerrar"><svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><use href="#ic-close"/></svg></button>
          <div class="hotspot-popup-title"></div>
          <img class="hotspot-popup-image" alt="">
          <div class="hotspot-popup-image-placeholder" style="display:none;"></div>
          <p></p>
        </div>
      `;

      // Contenido vía textContent (no innerHTML) para los campos de texto: evita
      // que un BT con caracteres especiales en el título/descripción rompa el markup.
      overlay.querySelector('.hotspot-popup-title').textContent = h.popupTitle || '';
      overlay.querySelector('p').textContent = h.popupText || '';

      // Estado de carga de la imagen: el placeholder arranca visible con
      // shimmer mientras el archivo descarga; al cargar, la imagen lo
      // reemplaza. Si falla (asset todavía no subido a assets/), el
      // placeholder queda estático con su etiqueta (textContent, nunca
      // innerHTML con strings externos).
      const img = overlay.querySelector('.hotspot-popup-image');
      const placeholder = overlay.querySelector('.hotspot-popup-image-placeholder');
      img.style.display = 'none';
      placeholder.style.display = 'flex';
      placeholder.classList.add('shimmer');
      img.onload = () => {
        placeholder.classList.remove('shimmer');
        placeholder.style.display = 'none';
        img.style.display = 'block';
      };
      img.onerror = () => {
        placeholder.classList.remove('shimmer');
        placeholder.textContent = `[ imagen — ${h.id} ]`;
      };
      img.src = h.popupImage || '';

      overlay.querySelector('.info-close').addEventListener('click', () => overlay.classList.remove('open'));
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) overlay.classList.remove('open');
      });

      container.appendChild(overlay);
    });
  }
  createHotspotPopups();

  function createHotspotElements() {
    HOTSPOTS_3D.forEach((h, idx) => {
      // Línea recta del punto de anclaje al número.
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('stroke', 'var(--gold-soft)');
      line.setAttribute('stroke-width', '1.5');
      hotspotSvg.appendChild(line);

      // Punto esférico en la superficie del modelo (mismo color que la línea).
      const anchor = document.createElement('div');
      anchor.className = 'hotspot-anchor';
      hotspotContainer.appendChild(anchor);

      // Círculo numerado al final de la línea — siempre visible, nunca se oculta.
      const number = document.createElement('div');
      number.className = 'hotspot-number';
      number.textContent = String(idx + 1);
      number.title = h.label;
      number.addEventListener('click', () => {
        const overlay = document.getElementById(`popup-${h.id}`);
        if (overlay) overlay.classList.add('open');
      });
      hotspotContainer.appendChild(number);

      hotspotElements[h.id] = { line, anchor, number };
    });
  }
  createHotspotElements();

  loader.load(
    MODEL_URL,
    async (gltf) => {
      loadResolved = true;
      clearTimeout(timeoutId);
      loadingMsg.remove();
      const shimmerEl = document.getElementById('viewerShimmer');
      if (shimmerEl) shimmerEl.remove();
      const model = gltf.scene;
      const box = new THREE.Box3().setFromObject(model);
      const size = box.getSize(new THREE.Vector3());

      // Geometría de base en espacio local, calculada UNA sola vez (E4): base
      // robusta por percentil 1 + footprint (centro XZ y radio) de la banda
      // inferior del 8% medida desde esa base. El encuadre (applyFraming) los
      // reutiliza en cada resize sin volver a recorrer los vértices.
      const baseY = computeRobustBaseY(model, box);
      const footprint = computeBaseFootprint(model, box, baseY);

      loadedModel = model;
      modelGeom = { size, baseY, topY: box.max.y, footprint, profile: resolveCompositionProfile(size) };

      modelGroup.add(model);

      // Encuadre completo E1–E3: escala por doble restricción según el Perfil
      // de Composición, base apoyada en y=0 y centrada por footprint, cámara a
      // media altura, y proyección del suelo para posicionar sombra y anillo.
      applyFraming();

      // Recalculamos el bounding box ya con la escala y posición finales aplicadas,
      // en el espacio local de modelGroup — este es el que usan los hotspots para
      // ubicarse sin importar la escala original del GLB.
      modelBoxForHotspots = new THREE.Box3().setFromObject(model);
      modelCenterForHotspots = modelBoxForHotspots.getCenter(new THREE.Vector3());
      computeHotspotAnchors(model);

      // Lever A: aplicar el acabado (roughness/metalness) a los materiales estándar
      // del mangle antes del posible parche de spec/gloss (que, si corriera, usa el
      // mismo MATERIAL_CONFIG y no genera conflicto).
      applyMaterialConfigToStandard(model);

      try {
        await applySpecGlossTextureManually(gltf);
      } catch (e) {
        console.warn('No se pudo aplicar la textura manualmente:', e);
      }
    },
    (progress) => {
      if (progress.total) {
        const pct = Math.round((progress.loaded / progress.total) * 100);
        loadingMsg.textContent = `Cargando modelo 3D… ${pct}%`;
      }
    },
    (err) => {
      loadResolved = true;
      clearTimeout(timeoutId);
      console.error('Error cargando GLB:', err);
      showViewerError('No se pudo cargar el modelo 3D.', MODEL_URL);
    }
  );

  // Rotación por arrastre (mouse y táctil) — SOLO horizontal (eje Y). Se eliminó
  // la rotación vertical a pedido: simplifica la interacción, reduce el costo de
  // cálculo (un eje menos que recalcular en cada frame), y evita ver el modelo
  // desde ángulos raros (por abajo/arriba) que no aportan a una pieza de museo.
  let isDragging = false;
  let prevX = 0;
  let rotY = 0;

  function onDown(x) { isDragging = true; prevX = x; }
  function onMove(x) {
    if (!isDragging) return;
    const dx = x - prevX;
    rotY += dx * 0.01;
    modelGroup.rotation.y = rotY;
    prevX = x;
  }
  function onUp() { isDragging = false; }

  renderer.domElement.addEventListener('mousedown', (e) => onDown(e.clientX));
  window.addEventListener('mousemove', (e) => onMove(e.clientX));
  window.addEventListener('mouseup', onUp);

  renderer.domElement.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) onDown(e.touches[0].clientX);
  }, { passive: true });
  renderer.domElement.addEventListener('touchmove', (e) => {
    if (e.touches.length === 1) onMove(e.touches[0].clientX);
  }, { passive: true });
  renderer.domElement.addEventListener('touchend', onUp);

  // Zoom eliminado a propósito: el modelo ya ocupa un porcentaje fijo y considerable
  // de la pantalla desde el principio (es el protagonista), así que no hace falta
  // acercarlo más. Esto también evita el desplazamiento desprolijo de los hotspots
  // hacia afuera que ocurría al hacer zoom, y reduce código/superficie de bugs.

  // ---------- HOTSPOTS ANCLADOS EN 3D (declaración movida arriba, antes de loader.load,
  // para que modelBoxForHotspots exista cuando el callback de carga la usa) ----------

  // Proyecta cada hotspot de coordenadas 3D (relativas al modelo) a coordenadas
  // 2D de pantalla, considerando la rotación y el zoom actuales de la cámara.
  // Esto es lo que hace que "viajen con la pieza" en vez de quedar fijos en pantalla.

  // Distancia (en unidades de mundo, con el modelo ya escalado por el encuadre)
  // que el número se aleja del punto de anclaje en la superficie. Suficiente
  // para despegarse visualmente de la pieza sin alejarse demasiado.
  const HOTSPOT_LINE_LENGTH = 0.55;

  // Margen de seguridad en píxeles para que el número nunca quede pegado
  // al borde exacto del visor — siempre dentro de la pantalla con este respiro.
  const SCREEN_CLAMP_MARGIN = 18;

  // Proyección mundo→pantalla (px relativos al mount). La usan los hotspots en
  // cada frame y el anclaje de sombra+anillo (regla E3) al cargar y en resize.
  function projectToScreen(vec3) {
    const halfW = mount.clientWidth / 2;
    const halfH = mount.clientHeight / 2;
    const p = vec3.clone().project(camera);
    return {
      x: p.x * halfW + halfW,
      y: -p.y * halfH + halfH,
      behindCamera: p.z > 1,
    };
  }

  // Anclajes reales calculados UNA VEZ cuando el modelo carga (no en cada frame:
  // la geometría local no cambia, solo rota — recalcular el raycast en cada frame
  // sería trabajo innecesario). Se completan en computeHotspotAnchors(), llamada
  // desde loader.load() después de centrar/escalar el modelo.
  const hotspotAnchorsLocal = {}; // { id: THREE.Vector3 en espacio local de modelGroup }

  // Calcula el punto de anclaje real de cada hotspot sobre la superficie del
  // modelo vía raycasting, una sola vez al cargar (en resize los anclajes se
  // re-escalan linealmente dentro de applyFraming, sin repetir el raycast).
  function computeHotspotAnchors(model) {
    const anchorRaycaster = new THREE.Raycaster();
    const box = new THREE.Box3().setFromObject(model);
    const sphere = new THREE.Sphere();
    box.getBoundingSphere(sphere);
    // Radio de partida para el rayo: bien afuera del modelo, para garantizar
    // que el rayo hacia el centro siempre atraviese la superficie real. La
    // esfera envolvente se usa ÚNICAMENTE para este radio de origen (E5).
    const rayOriginDistance = sphere.radius * 2.5;

    HOTSPOTS_3D.forEach((h) => {
      const azimuthRad = (h.azimuthDeg * Math.PI) / 180;
      // E5 — la altura se resuelve sobre el BOUNDING BOX, no sobre la esfera
      // envolvente: y = base + (tope − base) × heightFraction. Tras el encuadre,
      // la base robusta (E4) apoya en y=0 y el tope queda en currentModelHeight,
      // así que el contrato del BT (0 = base del modelo, 1 = tope) se cumple
      // exacto. Calcularlo sobre la esfera lo rompía en toda pieza no esférica
      // (en un cuenco ancho, 0 caía por debajo de la base física y 1 por encima
      // del tope).
      const y = currentModelHeight * h.heightFraction;

      // Punto de partida del rayo: bien afuera del modelo, en la dirección angular
      // indicada, a la altura deseada.
      const origin = new THREE.Vector3(
        sphere.center.x + Math.sin(azimuthRad) * rayOriginDistance,
        y,
        sphere.center.z + Math.cos(azimuthRad) * rayOriginDistance
      );
      // Importante: el rayo apunta al CENTRO GEOMÉTRICO REAL (sphere.center, sin fijar
      // la altura Y), no a un punto horizontal a la misma altura del origen. Para formas
      // anchas y poco altas (como un bowl/cuenco), un rayo puramente horizontal puede
      // pasar por encima o por debajo de la geometría real sin tocarla nunca, especialmente
      // cerca de la base o el borde superior. Apuntando al centro real, el rayo entra en
      // ángulo y siempre cruza el volumen del objeto sin importar la altura relativa.
      const direction = sphere.center.clone().sub(origin).normalize();

      anchorRaycaster.set(origin, direction);
      const intersects = anchorRaycaster.intersectObject(model, true);

      if (intersects.length > 0) {
        // Primer punto de impacto = superficie real exterior del modelo, en
        // coordenadas LOCALES de modelGroup (donde vive el resto de la lógica).
        hotspotAnchorsLocal[h.id] = model.parent.worldToLocal(intersects[0].point.clone());
      } else {
        // Fallback si el rayo no pega contra nada (geometría con huecos, etc.):
        // usamos un punto en la superficie de la esfera envolvente, mejor que nada.
        const fallback = sphere.center.clone().add(
          new THREE.Vector3(Math.sin(azimuthRad), 0, Math.cos(azimuthRad)).multiplyScalar(sphere.radius)
        );
        fallback.y = y;
        hotspotAnchorsLocal[h.id] = fallback;
      }
    });
  }

  function updateHotspotPositions() {
    if (!modelCenterForHotspots) return;
    const center = modelCenterForHotspots;

    HOTSPOTS_3D.forEach((h) => {
      const localAnchor = hotspotAnchorsLocal[h.id];
      if (!localAnchor) return;

      const outwardDir = localAnchor.clone().sub(center).normalize();
      const localNumberPos = localAnchor.clone().add(outwardDir.multiplyScalar(HOTSPOT_LINE_LENGTH));

      const worldAnchor = localAnchor.clone().applyEuler(modelGroup.rotation);
      const worldNumber = localNumberPos.clone().applyEuler(modelGroup.rotation);
      const worldOutward = outwardDir.clone().applyEuler(modelGroup.rotation);

      const anchorScreen = projectToScreen(worldAnchor);
      const numberScreen = projectToScreen(worldNumber);

      const els = hotspotElements[h.id];
      if (!els) return;

      const w = mount.clientWidth;
      const hgt = mount.clientHeight;
      const clampedX = Math.max(SCREEN_CLAMP_MARGIN, Math.min(w - SCREEN_CLAMP_MARGIN, numberScreen.x));
      const clampedY = Math.max(SCREEN_CLAMP_MARGIN, Math.min(hgt - SCREEN_CLAMP_MARGIN, numberScreen.y));

      // El número SIEMPRE se muestra, incluso "detrás" del modelo — solo se oculta
      // si queda literalmente detrás de la cámara (caso raro, rotación extrema).
      els.number.style.display = numberScreen.behindCamera ? 'none' : 'flex';
      els.number.style.left = `${clampedX}px`;
      els.number.style.top = `${clampedY}px`;

      // Estimación de "lado visible" SIN raycasting: comparamos la dirección hacia
      // afuera del anclaje (worldOutward) con la dirección hacia la cámara. Si apuntan
      // en sentidos parecidos (dot product positivo), el punto mira hacia el espectador;
      // si apuntan en sentidos opuestos, está del lado de atrás. Esto es una sola resta
      // y un producto escalar — miles de veces más barato que lanzar un rayo contra
      // toda la malla, y para el propósito de "atenuar cuando está del otro lado" da
      // un resultado visualmente indistinguible del raycasting real.
      const toCameraDir = camera.position.clone().sub(worldAnchor).normalize();
      const facingDot = worldOutward.dot(toCameraDir); // 1 = de frente, -1 = de espaldas

      // En vez de ocultar abruptamente, atenuamos la opacidad de forma gradual:
      // visible al 100% cuando mira de frente, ~25% cuando está del otro lado.
      // Esto da la sensación de "está ahí pero del otro lado" sin el costo de
      // calcular oclusión geométrica real, y sin el "parpadeo" de mostrar/ocultar.
      // (facingDot+1)/2 da 0 cuando está de espaldas y 1 cuando está de frente.
      // Aplicamos una potencia <1 para "empujar" los valores intermedios y altos
      // más cerca de 1 (más opaco de frente), sin subir el piso mínimo de atrás.
      const facing01 = (facingDot + 1) / 2;
      const opacity = numberScreen.behindCamera ? 0 : Math.max(0.25, Math.pow(facing01, 0.5));
      els.anchor.style.opacity = opacity;
      els.line.style.opacity = opacity * 0.8;
      els.number.style.opacity = Math.max(0.55, opacity); // el número se atenúa menos: siempre debe notarse

      els.anchor.style.display = 'block';
      els.anchor.style.left = `${anchorScreen.x}px`;
      els.anchor.style.top = `${anchorScreen.y}px`;

      els.line.style.display = 'block';
      els.line.setAttribute('x1', anchorScreen.x);
      els.line.setAttribute('y1', anchorScreen.y);
      els.line.setAttribute('x2', clampedX);
      els.line.setAttribute('y2', clampedY);
    });
  }


  // El renderizado 3D (rotación visual) corre a 60fps siempre, vía renderer.render().
  // Pero recalcular las posiciones de los hotspots (que implica varios raycasting
  // costosos contra la malla real) NO necesita esa frecuencia para verse fluido al
  // ojo humano — lo limitamos a ~15 veces por segundo, reduciendo el costo total
  // en más de 4x sin pérdida visual perceptible. Esta era la causa principal del
  // lag al rotar y del consumo elevado de batería.
  let lastHotspotUpdate = 0;
  const HOTSPOT_UPDATE_INTERVAL = 1000 / 30; // ahora que no hay raycasting, el cálculo es barato — podemos subir a 30fps sin impacto real en batería

  function animate(timestamp) {
    requestAnimationFrame(animate);
    if (!lastHotspotUpdate || timestamp - lastHotspotUpdate >= HOTSPOT_UPDATE_INTERVAL) {
      updateHotspotPositions();
      lastHotspotUpdate = timestamp;
    }
    renderer.render(scene, camera);
  }
  animate();

  // Resize (rotación de pantalla / cambio de viewport): se actualizan cámara y
  // renderer Y se re-ejecuta el encuadre completo E1–E3 — incluida la
  // reproyección del suelo para sombra y anillo — debounced, para no recorrer
  // el cálculo decenas de veces durante una misma rotación del dispositivo.
  // Todo ocurre JUNTO dentro del callback debounced, leyendo las dimensiones
  // reales del mount en ese momento: si cámara/canvas y encuadre se
  // actualizaran en momentos distintos (evento vs debounce), un reflow
  // intermedio puede dejarlos inconsistentes y el modelo queda desfasado del
  // anillo. Se observa el propio mount con ResizeObserver (además del resize
  // de window) porque cubre también cambios de layout que no despachan
  // 'resize' al documento.
  let resizeTimer = 0;
  function handleViewportChange() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      const newW = mount.clientWidth;
      const newH = mount.clientHeight;
      if (!newW || !newH) return;
      camera.aspect = newW / newH;
      camera.updateProjectionMatrix();
      renderer.setSize(newW, newH);
      applyFraming();
    }, 150);
  }
  window.addEventListener('resize', handleViewportChange);
  new ResizeObserver(handleViewportChange).observe(mount);
</script>

</body>
</html>
